name: Fantasy weekly projections

on:
  workflow_dispatch:
    inputs:
      season:
        description: Optional NFL season override
        required: false
        type: string
      week:
        description: Optional NFL week override
        required: false
        type: string
      fast:
        description: Use reduced learners for a diagnostic run
        required: false
        default: false
        type: boolean
  schedule:
    # Refresh after Wednesday practice reports and again Sunday morning.
    - cron: "35 23 * 9-12,1 3"
    - cron: "15 14 * 9-12,1 0"

permissions:
  contents: read

concurrency:
  group: fantasy-weekly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  project:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - uses: actions/cache@v5
        with:
          path: historical/fantasy
          key: fantasy-history-${{ runner.os }}-${{ hashFiles('requirements.txt', 'nflvalue/fantasy/data.py', 'nflvalue/fantasy/features.py') }}
          restore-keys: fantasy-history-${{ runner.os }}-
      - name: Build current projections
        shell: bash
        run: |
          args=()
          [[ -z "${{ inputs.season }}" ]] || args+=(--season "${{ inputs.season }}")
          [[ -z "${{ inputs.week }}" ]] || args+=(--week "${{ inputs.week }}")
          [[ "${{ inputs.fast }}" != "true" ]] || args+=(--fast)
          python scripts/fantasy_weekly.py "${args[@]}"
      - name: Verify generated contract
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("data/fantasy_latest.json").read_text())
          assert payload["players"], "weekly fantasy output contains no players"
          assert payload["simulation"]["simulations"] >= 1000
          assert Path("fantasy.html").stat().st_size > 1000
          PY
      - uses: actions/upload-artifact@v6
        with:
          name: fantasy-${{ github.run_id }}
          retention-days: 30
          path: |
            data/fantasy_latest.json
            data/fantasy_model.joblib
            reports/fantasy_model_card.json
            fantasy.html
